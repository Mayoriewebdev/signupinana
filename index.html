<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Fund Raising </title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>


    <!-- navbar -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">
            <img src="images/Logo.png" alt="Logo">
        </div>

    </nav>
    <!-- end of navbar -->




    <section class="signup-section">
    <div class="signup-container">

        <!-- Profile Image -->
        <div class="profile-img" data-aos="zoom-in">
            <img src="images/Image icon.png" alt="profile">
        </div>

        <!-- Signup Title Image -->
        <div class="signup-title" data-aos="fade-up" data-aos-delay="200">
            <img src="images/signup text2.png" alt="Signup">
        </div>

        <form data-aos="fade-up" data-aos-delay="400">
            <label>Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" placeholder="Enter your password">

            <!-- Button Image -->
            <button type="submit" class="btn-img" data-aos="zoom-in" data-aos-delay="600">
                <img src="images/continue.png" alt="Continue">
            </button>
        </form>

        <!-- Terms Image -->
        <div class="terms-img" data-aos="fade-up" data-aos-delay="800">
            <img src="images/Agree.png" alt="Terms and Conditions">
        </div>

    </div>
</section>





    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>

</body>

</html>
